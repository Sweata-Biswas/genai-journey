<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body class="mt-5 bg-light" style="font-family:Poppins">
<div class="container">
<div class="row justify-content-center mt-5 ">
    <div class="col-md-6">
        <div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">Weather App</h3>

<form method="POST">

<input 
class="form-control mb-3"
type="text"
name="city"
placeholder="Enter city name"
required
>

<button class="btn btn-primary w-100">
Get Weather
</button>

</form>

<!-- Jinja template logic.Jinja lets you embed Python-like logic inside HTML -->
{% if weather %}

<div class="card mt-4 bg-info text-white">

<div class="card-body text-center">

<h4>{{ weather.city }}</h4>

<p class="mb-1">
Temperature: {{ weather.temperature }} °C
</p>

<p class="mb-1">
Condition: {{ weather.description }}
</p>

<p clas="mb-0">
    Humidity: {{ weather.humidity }}</p>



</div>
</div>

{% endif %}
</div>
</div>
</div>
</div>
</div>
</body>
</html>
